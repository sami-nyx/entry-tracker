services:
  web:
    build: ./entryTracker
    container_name: entry-tracker-app
    environment:
      - DB_HOST=db
      - DB_USER=${DB_USER}    
      - DB_PASSWORD=${DB_PASSWORD}
      - DB_NAME=${DB_NAME}
    ports:
      - "5000:5000"
    networks:
      - app_network
    depends_on:
      db:
        condition: service_healthy  # Wait until the healthcheck passes, not just until the container starts

  db:
    image: mysql:5.7
    container_name: mysql-db
    restart: always
    environment:
      - MYSQL_ROOT_PASSWORD=${DB_PASSWORD}
      - MYSQL_DATABASE=${DB_NAME}
      - MYSQL_USER=${DB_USER}
      - MYSQL_PASSWORD=${DB_PASSWORD}
    ports:
      - "3306:3306"
    volumes:
      - db-data:/var/lib/mysql
    networks:
      - app_network
    # HEALTHCHECK: Ensures MySQL is fully ready to accept connections before web starts
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${DB_PASSWORD}"]
      interval: 5s
      timeout: 5s
      retries: 5

networks:
  app_network:

volumes:
  db-data:
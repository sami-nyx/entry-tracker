name: package-and-e2e
on:
  workflow_call:
    secrets:
      DB_PASSWORD:
        required: true
      DB_ROOT_PASSWORD:
        required: true

jobs:
  package-e2e:
    runs-on: ubuntu-latest
    permissions:
      id-token: write 
      contents: write 
    steps:
    # 1. Check out the repository code
    - name: Checkout code
      uses: actions/checkout@v6


    # - name: List images
    #   run: docker images  

#==============================================================================================
#                                             Package
#==============================================================================================
    - name: Package
      run: |
        docker compose up -d
      env:
        DB_HOST: ${{ vars.DB_HOST }} 
        DB_USER: ${{ vars.DB_USER }}
        DB_NAME: ${{ vars.DB_NAME }}
        DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
        DB_ROOT_PASSWORD: ${{ secrets.DB_ROOT_PASSWORD }}
   

#==============================================================================================
#                                          Integration test
#==============================================================================================
    - name: Execute integration test
      run: |
        chmod u+x $SCRIPT_PATH
        $SCRIPT_PATH
      env:
        SCRIPT_PATH: ./.github/scripts/test_entry_tracker.sh

#==============================================================================================
#                                          Resolve tag
#==============================================================================================
    - name: Resolve next tag
      id: resolve-tag
      uses: ./.github/actions/resolve-next-tag
      with:
        major-minor-patch: 'patch'

#==============================================================================================
#                                         configure AWS (assume role)
#==============================================================================================
    - name: Configure AWS Credentials via OIDC for ECR image push
      uses: aws-actions/configure-aws-credentials@v6
      with:
        role-to-assume: arn:aws:iam::889867978066:role/github-actions-ecr-push-role
        aws-region: ap-south-1 
        disable-retry: true 

#==============================================================================================
#                                         Login to ECR
#==============================================================================================
    - name: Login to Amazon ECR
      id: login-ecr
      uses: aws-actions/amazon-ecr-login@v2

#==============================================================================================
#                                         Tag Image
#==============================================================================================
    - name: Tag the entry tracker image
      run: docker tag entry-tracker:latest $ECR_REGISTRY/$ECR_REPOSITORY :$IMAGE_TAG
      env:
        ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
        ECR_REPOSITORY: entry-tracker
        IMAGE_TAG: ${{ steps.resolve-tag.outputs.NEXT_TAG }}
    
    - name: List images
      run: docker images


        # local/entry-tracker  
name: Reusable build and unit test workflow

on:
  workflow_call:

jobs:
  run-tests:
    runs-on: ubuntu-latest
    
    steps:

    #Check out the repository code
    - name: Checkout code
      uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 #v7
    
    #Set up Python 3.10
    - name: Set up Python 3.10
      uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 #v6.3.0
      with:
        python-version: '3.10'
        cache: 'pip' 
        cache-dependency-path: 'entryTracker/requirements.txt'

        
#==============================================================================================
#                                             install
#==============================================================================================
    - name: Install dependencies
      run: |

        python -m pip install --upgrade pip
        pip install -r entryTracker/requirements.txt
        
        if [ $? -eq 0 ]; then
          echo "::notice::Dependencies installed successfully"
        else
          echo "::error::Failed installing dependencies"
          exit 1 
        fi
        
#==============================================================================================
#                                             run
#==============================================================================================
    - name: Run App and Test with Curl
      run: |
        python entryTracker/app.py &
        if [ $? -eq 0 ]; then
          echo "::notice::App started in background"
        else
          echo "[::error::app failed to start"
          exit 1 
        fi
        

#==============================================================================================
#                                             unit test
#==============================================================================================
    - name: Unit test
      run: |
        sleep 3
        RESPONSE=$(curl -f http://127.0.0.1:5000/)
        if echo "$RESPONSE" | grep -q "current_entry"; then
          echo "::notice::uinit test success"
        else
          echo "::error::unit test fail"
          echo "Raw Response: $RESPONSE"
          exit 1
        fi

      
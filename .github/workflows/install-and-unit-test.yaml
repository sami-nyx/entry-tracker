name: Reusable build and unit test workflow

on:
  workflow_call:

jobs:
  run-tests:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./entryTracker
    steps:

    # 1. Check out the repository code
    - name: Checkout code
      uses: actions/checkout@v6
    
    # 2. Set up Python 3.10
    - name: Set up Python 3.10
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'
        cache: 'pip' 
        cache-dependency-path: 'entryTracker/requirements.txt'

    - name: Initiate report artifact
      run: |
        cat << EOF > report.txt
        ==========================================================
        [$(date)]install and unit test started
        ==========================================================
        EOF
        
#==============================================================================================
#                                             install
#==============================================================================================
    - name: Install dependencies
      run: |

        python -m pip install --upgrade pip
        pip install -r requirements.txt
        
        if [ $? -eq 0 ]; then
          echo "[$(date)]dependencies installed sccessfully" >> report.txt
        else
          echo "[$(date)]failed installing dependencies " >> report.txt
          exit 1 
        fi
        
#==============================================================================================
#                                             run
#==============================================================================================
    - name: Run App and Test with Curl
      run: |
        echo "[$(date)]running the app in the background" >> report.txt
        python app.py &
        

#==============================================================================================
#                                             unit test
#==============================================================================================
    - name: Unit test
      run: |
        sleep 3
        RESULT=$(curl -f http://127.0.0.1:5000/)
        if echo "$RESULT" | grep -q "current_entry"; then
          echo "[$(date)]uinit test success" >> report.txt
        else
          echo "[$(date)]unit test fail" >> report.txt
          echo "$RESULT" >> report.txt
          exit 1
        fi

        echo "result: $RESULT" >> report.txt
        
    - name: Upload artifact
      run: cat report.txt
name: deliver-and-deploy
on:
  workflow_call:
    secrets:
      DB_PASSWORD:
        required: true
      DB_ROOT_PASSWORD:
        required: true
jobs:
  deliver:
    runs-on: ubuntu-latest
    permissions:
      id-token: write 
      contents: read

    steps:


#==============================================================================================
#                                         Configure aws 
#==============================================================================================
    - name: Configure AWS Credentials via OIDC
      uses: aws-actions/configure-aws-credentials@e7f100cf4c008499ea8adda475de1042d6975c7b #v6.2.0
      with:
        role-to-assume: arn:aws:iam::${{ vars.AWS_ACCOUNT }}:role/github-actions-ecr-push-role
        aws-region: ${{ vars.AWS_REGION }} 
        disable-retry: true 


#==============================================================================================
#                                         Login to ecr
#==============================================================================================
    - name: Login to Amazon ECR
      id: login-ecr
      uses: aws-actions/amazon-ecr-login@33f92af657bba1882ab79d8621debd2f6769a0c9 #v2

#==============================================================================================
#                                         Ceckout code
# ==============================================================================================
    - name: Checkout code
      uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 #v7


#==============================================================================================
#                                         E2e test
#==============================================================================================
    - name: Prepare for e2e test
      run: |
        docker compose pull
        docker compose up -d --no-build --remove-orphans
      env:
        DB_HOST: ${{ vars.DB_HOST }} 
        DB_USER: ${{ vars.DB_USER }}
        DB_NAME: ${{ vars.DB_NAME }}
        DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
        DB_ROOT_PASSWORD: ${{ secrets.DB_ROOT_PASSWORD }}
        ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
        ECR_REPOSITORY: entry-tracker
        IMAGE_TAG: latest
    - name: Debug Container Failure Logs
      if: failure()
      run: |
        docker compose ps
        docker compose logs db
        docker compose logs web

    - name: Execute e2e test
      run: |
        chmod u+x $SCRIPT_PATH
        $SCRIPT_PATH
        docker compose down >/dev/null
      env:
        SCRIPT_PATH: ./.github/scripts/test_entry_tracker.sh
    

#==============================================================================================
#                                Ship docker compose file to ec2
#==============================================================================================
    - name: Ship Docker Compose Manifest
      uses: ./.github/actions/ssm-ship-file
      id: run_ssm
      with:
          source-file: './docker-compose.yaml'
          target-path: '/home/ec2-user/entry-tracker/docker-compose.yaml'
          environment-tag: 'staging'
          project-tag: 'entry-tracker'

#==============================================================================================
#                                 Ship nginx config file to ec2
#==============================================================================================
    - name: Ship nginx config file
      uses: ./.github/actions/ssm-ship-file
      with:
          source-file: './nginx_conf/default.conf'
          target-path: '/home/ec2-user/entry-tracker/nginx_conf/default.conf'
          environment-tag: 'staging'
          project-tag: 'entry-tracker'

#==============================================================================================
#                                         Deoply to ec2
#==============================================================================================
    - name: Run Remote Deployment Script via SSM
      run: |
        # 1. Read the external file script
        RAW_SCRIPT=$(cat ./.github/scripts/deploy.sh)

        # 2. Prepend the dynamic GitHub workflow variables to the top of the execution string
        INJECTED_SCRIPT=$(cat << EOF
        export ECR_REGISTRY="${{ steps.login-ecr.outputs.registry }}"
        export ECR_REPOSITORY="entry-tracker"
        export IMAGE_TAG="latest"
        $RAW_SCRIPT
        EOF
        )

        # 3. Escape everything safely into a single valid JSON string payload array
        SCRIPT_CONTENT=$(echo "$INJECTED_SCRIPT" | jq -R -s '.')

        # 4. Fire the SSM command cleanly
        COMMAND_ID=$(aws ssm send-command \
          --document-name "AWS-RunShellScript" \
          --comment "Shipping file via composite action: ${{ github.sha }}" \
          --targets '[
            {"Key": "tag:Environment", "Values": ["staging"]},
            {"Key": "tag:Project", "Values": ["entry-tracker"]}
          ]' \
          --parameters "{\"commands\": [$SCRIPT_CONTENT]}" \
          --query "Command.CommandId" \
          --output text)

        echo "SSM Command triggered successfully! Command ID: $COMMAND_ID"
        echo "COMMAND_ID=$COMMAND_ID" >> $GITHUB_ENV
        



#==============================================================================================
#                  Wait for ssm (on ec2 instance) agent to consume script
#Reuired aws permissions:
# ssm:list-commands
#==============================================================================================
    - name: wait for script to be executed
      run: |
        echo "Waiting for SSM Command $COMMAND_ID to process across targets..."
        
        # 1. Periodically poll until the overall command is no longer "Pending" or "InProgress"
        while true; do
          STATUS=$(aws ssm list-commands --command-id "$COMMAND_ID" --query "Commands[0].Status" --output text)
          if [[ "$STATUS" != "Pending" && "$STATUS" != "InProgress" ]]; then
            echo "SSM Execution completed with status: $STATUS"
            break
          fi
          echo "Still executing... checking again in 5 seconds."
          sleep 5
        done

#==============================================================================================
#                              Fetch a single target ec2 instance IP
#Reuired aws permissions:
# ssm:list-command-invocations
# ec2:describe-instances
#==============================================================================================


    - name: Get Target EC2 Public IP
      id: fetch-instance-id
      run: |
        echo "Fetching Instance ID targeted by SSM Command: $COMMAND_ID"
      
        # 1. Get the Instance ID that executed the command
        INSTANCE_ID=$(aws ssm list-command-invocations \
          --command-id "$COMMAND_ID" \
          --query "CommandInvocations[0].InstanceId" \
          --output text)
        
        if [ -z "$INSTANCE_ID" ] || [ "$INSTANCE_ID" == "None" ]; then
          echo "Error: Could not retrieve a valid Instance ID for this command."
          exit 1
        fi
        echo "Found Target Instance ID: $INSTANCE_ID"

        # 2. Query EC2 to fetch the Public IP Address of that instance
        EC2_PUBLIC_IP=$(aws ec2 describe-instances \
          --instance-ids "$INSTANCE_ID" \
          --query "Reservations[0].Instances[0].PublicIpAddress" \
          --output text)

        if [ -z "$EC2_PUBLIC_IP" ] || [ "$EC2_PUBLIC_IP" == "None" ]; then
          echo "Error: Could not find a Public IP for instance $INSTANCE_ID"
          exit 1
        fi
        echo "Target EC2 Public IP: $EC2_PUBLIC_IP"
        
        echo "EC2_PUBLIC_IP=$EC2_PUBLIC_IP" >> $GITHUB_OUTPUT

        # # 3. Test the deployment using curl
        # echo "Testing connection to http://$EC2_PUBLIC_IP ..."
        # curl --fail --connect-timeout 10 -v "http://$EC2_PUBLIC_IP"

#==============================================================================================
#                               verefy server up and running
#==============================================================================================
    - name: Verify server up adn running
      run: curl -f ${{ steps.fetch-instance-id.outputs.EC2_PUBLIC_IP }}

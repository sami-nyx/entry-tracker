    - name: Configure AWS Credentials via OIDC
      uses: aws-actions/configure-aws-credentials@v6
      with:
        role-to-assume: arn:aws:iam::889867978066:role/github-actions-ecr-push-role
        aws-region: ap-south-1 
        disable-retry: true 
    

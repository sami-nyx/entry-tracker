    - name: Run script on instance
      run: |
        echo "Sending deployment script to tagged EC2 instances"
        
        COMMAND_ID=$(aws ssm send-command \
          --targets "Key=tag:Environment,Values=production" "Key=tag:Project,Values=entry-tracker" \
          --document-name "AWS-RunShellScript" \
          --comment "Deploying entry-tracker:${{ github.sha }}" \
          --parameters 'commands=[
            "touch /home/ec2-user/hi-hi
          ]' \
          --query "Command.CommandId" \
          --output text)
          
        echo "Command sent successfully. Command ID: $COMMAND_ID"